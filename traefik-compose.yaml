networks:
  traefik-public:
    external: true

services:
  traefik:
    image: traefik:v3.6.13
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --providers.docker=true # to handle standard containers too outside swarm on local machine
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.refreshSeconds=1 # https://github.com/traefik/traefik/issues/7886
      - --providers.swarm.exposedByDefault=false
      - --entryPoints.web.address=:88
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - target: 88
        published: 88
        protocol: tcp
        mode: host
      - target: 8080
        published: 8088
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
    deploy:
      mode: global
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
